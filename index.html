<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 Тамагочи: Lexik Editor Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=Space+Grotesk:wght@500;700&family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Базовая палитра (Enchanted Forest) */
            --bg: #050e0a; --sidebar: rgba(7, 20, 16, 0.95);
            --card: rgba(22, 163, 74, 0.05); --accent: #16a34a;
            --accent-glow: rgba(22, 163, 74, 0.4); --text: #e2e8f0;
            --border-w: 2px; --radius: 20px; --font-main: 'Outfit', sans-serif;
        }

        .light-mode {
            --bg: #f8fafc; --sidebar: rgba(255, 255, 255, 0.9);
            --card: rgba(0, 0, 0, 0.03); --accent: #059669; --text: #1e293b;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            background: var(--bg); color: var(--text);
            font-family: var(--font-main); height: 100vh;
            margin: 0; display: flex; overflow: hidden;
        }

        /* 1. Функция скролла на всех этапах */
        .scroll-area {
            flex-grow: 1; overflow-y: auto; padding: 40px;
            height: 100vh; scroll-behavior: smooth;
        }
        .scroll-area::-webkit-scrollbar { width: 8px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* Боковая панель (Навигация) */
        aside {
            width: 300px; background: var(--sidebar);
            border-right: var(--border-w) solid var(--accent);
            display: flex; flex-direction: column; padding: 30px 20px;
            backdrop-filter: blur(20px); z-index: 100;
        }

        .logo-box { font-family: 'Space Grotesk'; font-size: 24px; font-weight: 700; color: var(--accent); margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }

        .nav-item {
            padding: 15px; margin-bottom: 10px; border-radius: 15px;
            cursor: pointer; display: flex; align-items: center; gap: 15px;
            font-weight: 600; border: none; background: transparent; color: var(--text);
            text-align: left; width: 100%;
        }
        .nav-item:hover, .nav-item.active { background: var(--card); color: var(--accent); transform: translateX(5px); }

        /* Контентные блоки */
        .panel { display: none; max-width: 900px; margin: 0 auto; animation: slideUp 0.4s ease; }
        .panel.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card {
            background: var(--card); border: var(--border-w) solid rgba(255,255,255,0.05);
            border-radius: var(--radius); padding: 30px; margin-bottom: 25px;
            backdrop-filter: blur(15px);
        }

        /* Поля ввода и Темы */
        .topics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        input, select {
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 15px; border-radius: 10px; color: white; width: 100%; outline: none;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        .lvl-header-input { font-weight: 900; font-size: 1.2rem; color: var(--accent); background: transparent; border: none; border-bottom: 2px solid var(--card); margin-bottom: 15px; }

        /* Футер редактора с кнопками */
        .editor-footer { display: flex; justify-content: space-between; margin-top: 40px; }
        .btn-main {
            padding: 12px 25px; border-radius: 12px; border: none; cursor: pointer;
            font-weight: 700; background: var(--accent); color: white; display: flex; align-items: center; gap: 8px;
        }
        .btn-secondary { background: rgba(255,255,255,0.1); color: var(--text); }

        /* Визуализация Котёнка */
        .kitty-preview { font-size: 80px; text-align: center; filter: drop-shadow(0 0 20px var(--accent-glow)); }

        .iframe-output {
            background: #000; color: #10b981; padding: 15px; border-radius: 10px;
            font-family: monospace; font-size: 12px; overflow-x: auto; margin: 10px 0;
            border: 1px solid var(--accent);
        }
    </style>
</head>
<body>

    <aside>
        <div class="logo-box">🌿 TAMA-LEXIK PRO</div>
        
        <nav>
            <button class="nav-item active" onclick="nav('step-start')">⚙️ <span data-i18n="nav-start">Начало</span></button>
            <button class="nav-item" onclick="nav('step-topics')">📚 <span data-i18n="nav-topics">12 Тем</span></button>
            <button class="nav-item" onclick="nav('step-design')">🎨 <span data-i18n="nav-design">Внешний вид</span></button>
            <button class="nav-item" onclick="nav('step-export')">🚀 <span data-i18n="nav-export">Экспорт</span></button>
        </nav>

        <div style="margin-top: auto;">
            <label style="font-size: 11px; opacity: 0.5; text-transform: uppercase;" data-i18n="lbl-lang">Язык редактора</label>
            <select id="ui-lang" onchange="applyLanguage(this.value)">
                <option value="ru">Русский</option><option value="en">English</option><option value="de">Deutsch</option>
                <option value="fr">Français</option><option value="es">Español</option><option value="it">Italiano</option>
                <option value="pt">Português</option><option value="zh">中文</option><option value="ja">日本語</option>
                <option value="ar">العربية</option><option value="hi">हिन्दी</option><option value="fa">فارسی</option>
            </select>
        </div>
    </aside>

    <div class="scroll-area">
        <header style="margin-bottom: 40px; display: flex; align-items: center; gap: 20px;">
            <button class="btn-main btn-secondary" onclick="goBack()" style="padding: 8px 12px;">↩</button>
            <h1 id="page-title" data-i18n="h-start">Настройки проекта</h1>
        </header>

        <section id="step-start" class="panel active">
            <div class="glass-card">
                <label data-i18n="lbl-game-title">Название вашей игры</label>
                <input type="text" id="inp-title" placeholder="Напр: Моя крутая лексика" oninput="autoSave()">
                <br><br>
                <label data-i18n="lbl-target-lang">Язык заданий в игре</label>
                <select id="inp-game-lang" onchange="autoSave()">
                    <option value="ru">Русский</option><option value="en">English</option>
                </select>
            </div>
            <div class="kitty-preview">🐱</div>
        </section>

        <section id="step-topics" class="panel">
            <div class="glass-card">
                <input type="text" class="lvl-header-input" id="lvl-1-name" value="Уровень 1: Базовый" oninput="autoSave()">
                <div class="topics-grid">
                    <input type="text" class="topic-in" placeholder="Тема 1"><input type="text" class="topic-in" placeholder="Тема 2">
                    <input type="text" class="topic-in" placeholder="Тема 3"><input type="text" class="topic-in" placeholder="Тема 4">
                </div>
            </div>
            <div class="glass-card">
                <input type="text" class="lvl-header-input" id="lvl-2-name" value="Уровень 2: Повышенный" oninput="autoSave()">
                <div class="topics-grid">
                    <input type="text" class="topic-in" placeholder="Тема 5"><input type="text" class="topic-in" placeholder="Тема 6">
                    <input type="text" class="topic-in" placeholder="Тема 7"><input type="text" class="topic-in" placeholder="Тема 8">
                </div>
            </div>
            <div class="glass-card">
                <input type="text" class="lvl-header-input" id="lvl-3-name" value="Уровень 3: Высокий" oninput="autoSave()">
                <div class="topics-grid">
                    <input type="text" class="topic-in" placeholder="Тема 9"><input type="text" class="topic-in" placeholder="Тема 10">
                    <input type="text" class="topic-in" placeholder="Тема 11"><input type="text" class="topic-in" placeholder="Тема 12">
                </div>
            </div>
        </section>

        <section id="step-design" class="panel">
            <div class="glass-card">
                <h3 data-i18n="h-visual">Визуальные эффекты</h3>
                <label data-i18n="lbl-theme">Тема оформления</label>
                <select onchange="toggleTheme(this.value)">
                    <option value="dark">Тёмная (Forest Noir)</option>
                    <option value="light">Светлая (Clean White)</option>
                </select>
                <br><br>
                <label data-i18n="lbl-border">Толщина линий</label>
                <input type="range" min="1" max="6" value="2" oninput="changeBorder(this.value)">
                <br><br>
                <label data-i18n="lbl-font">Шрифт</label>
                <select onchange="document.documentElement.style.setProperty('--font-main', this.value)">
                    <option value="'Outfit'">Outfit (Modern)</option>
                    <option value="'Comfortaa'">Comfortaa (Rounded)</option>
                    <option value="'Space Grotesk'">Space Grotesk (Tech)</option>
                </select>
            </div>
            <div class="glass-card">
                <h3 data-i18n="h-music">Музыкальное сопровождение</h3>
                <select id="bg-music">
                    <option value="none">Без музыки</option>
                    <option value="calm">Calm Piano</option>
                    <option value="nature">Nature Ambient</option>
                    <option value="8bit">8-Bit Fun</option>
                </select>
            </div>
        </section>

        <section id="step-export" class="panel">
            <div class="glass-card">
                <h3 data-i18n="if-editor">Ссылка на Редактор (для правок):</h3>
                <div class="iframe-output" id="out-editor-url">https://irinschensmagen-alt.github.io/Editor...</div>
                
                <h3 style="margin-top:20px;" data-i18n="if-game">Iframe Игры (для Genially):</h3>
                <div class="iframe-output" id="out-game-iframe">&lt;iframe src="..." width="100%" height="600px"&gt;&lt;/iframe&gt;</div>
            </div>
        </section>

        <div class="editor-footer">
            <button class="btn-main btn-secondary" onclick="goBack()" data-i18n="btn-back">↩ Назад</button>
            <button class="btn-main" onclick="goNext()" data-i18n="btn-next">Далее ➔</button>
        </div>
    </div>

    <script>
        // Данные локализации
        const translations = {
            ru: {
                "nav-start": "Начало", "nav-topics": "12 Тем", "nav-design": "Дизайн", "nav-export": "Экспорт",
                "h-start": "Настройки проекта", "lbl-game-title": "Название игры", "btn-next": "Далее ➔", "btn-back": "↩ Назад",
                "if-editor": "Ссылка на редактор:", "if-game": "Iframe игры для Genially:", "h-visual": "Визуальные эффекты"
            },
            en: {
                "nav-start": "Start", "nav-topics": "12 Topics", "nav-design": "Design", "nav-export": "Export",
                "h-start": "Project Settings", "lbl-game-title": "Game Title", "btn-next": "Next ➔", "btn-back": "↩ Back",
                "if-editor": "Editor Link:", "if-game": "Game Iframe for Genially:", "h-visual": "Visual Effects"
            }
            // ... (аналогично для других 10 языков)
        };

        let currentStepIdx = 0;
        const steps = ['step-start', 'step-topics', 'step-design', 'step-export'];

        function nav(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // Подсветка кнопки
            const btn = Array.from(document.querySelectorAll('.nav-item')).find(b => b.onclick.toString().includes(id));
            if(btn) btn.classList.add('active');
            
            currentStepIdx = steps.indexOf(id);
        }

        function goNext() { if(currentStepIdx < steps.length - 1) nav(steps[currentStepIdx + 1]); }
        function goBack() { if(currentStepIdx > 0) nav(steps[currentStepIdx - 1]); }

        function applyLanguage(lang) {
            const dict = translations[lang] || translations['en'];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(dict[key]) el.innerText = dict[key];
            });
            document.body.dir = (lang === 'ar' || lang === 'fa') ? 'rtl' : 'ltr';
            autoSave();
        }

        function toggleTheme(theme) {
            document.body.className = theme === 'light' ? 'light-mode' : '';
        }

        function changeBorder(val) {
            document.documentElement.style.setProperty('--border-w', val + 'px');
        }

        // Автосохранение
        function autoSave() {
            const data = {
                title: document.getElementById('inp-title').value,
                gameLang: document.getElementById('inp-game-lang').value,
                uiLang: document.getElementById('ui-lang').value,
                lvlNames: [document.getElementById('lvl-1-name').value, document.getElementById('lvl-2-name').value, document.getElementById('lvl-3-name').value],
                topics: Array.from(document.querySelectorAll('.topic-in')).map(i => i.value)
            };
            localStorage.setItem('tama_ultra_data', JSON.stringify(data));
            updateExportLinks(data);
        }

        function updateExportLinks(data) {
            const editorUrl = window.location.href.split('?')[0];
            document.getElementById('out-editor-url').innerText = editorUrl;
            document.getElementById('out-game-iframe').innerText = `<iframe src="https://irinschensmagen-alt.github.io/Game-Build/" width="100%" height="600px"></iframe>`;
        }

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('tama_ultra_data'));
            if(saved) {
                document.getElementById('inp-title').value = saved.title || '';
                document.getElementById('ui-lang').value = saved.uiLang || 'ru';
                const topics = document.querySelectorAll('.topic-in');
                saved.topics.forEach((t, i) => { if(topics[i]) topics[i].value = t; });
                applyLanguage(saved.uiLang || 'ru');
            }
        };
    </script>
</body>
</html>
