<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 Tamagotchi Lexik Ultra-Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050e0a; --sidebar: #071410; --card: rgba(22, 163, 74, 0.05);
            --accent: #16a34a; --accent-glow: rgba(22, 163, 74, 0.3);
            --text: #e2e8f0; --border-w: 2px; --radius: 18px;
            --font-main: 'Outfit', sans-serif;
        }

        .light-mode {
            --bg: #f8fafc; --sidebar: #ffffff; --card: rgba(0,0,0,0.03);
            --accent: #059669; --text: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.2s ease; }
        
        body {
            background-color: var(--bg); color: var(--text);
            font-family: var(--font-main); height: 100vh; display: flex; overflow: hidden;
        }

        /* 1. Функция скролла везде */
        .scroll-container {
            flex-grow: 1; overflow-y: auto; height: 100vh;
            display: flex; flex-direction: column; scroll-behavior: smooth;
        }
        .scroll-container::-webkit-scrollbar { width: 6px; }
        .scroll-container::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* Sidebar */
        aside {
            width: 280px; background: var(--sidebar); border-right: var(--border-w) solid var(--accent);
            display: flex; flex-direction: column; padding: 30px 20px; flex-shrink: 0;
        }

        .logo { font-family: 'Space Grotesk'; font-weight: 700; font-size: 20px; color: var(--accent); margin-bottom: 40px; }

        /* Кнопки навигации (Пункт 6) */
        .nav-btn {
            width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px;
            border: none; background: transparent; color: var(--text);
            text-align: left; cursor: pointer; display: flex; align-items: center; gap: 12px;
            font-weight: 600;
        }
        .nav-btn:hover, .nav-btn.active { background: var(--card); color: var(--accent); box-shadow: inset 4px 0 0 var(--accent); }

        /* Основной контент */
        .panel { display: none; padding: 40px; max-width: 900px; margin: 0 auto; width: 100%; }
        .panel.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .glass-card {
            background: var(--card); border: var(--border-w) solid rgba(255,255,255,0.05);
            border-radius: var(--radius); padding: 30px; margin-bottom: 25px; backdrop-filter: blur(12px);
        }

        h2 { font-size: 32px; font-weight: 900; margin-bottom: 25px; }

        /* 10. Темы (4 на уровень) */
        .topics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 15px; }
        .lvl-header { font-weight: 800; color: var(--accent); margin-bottom: 10px; font-size: 14px; text-transform: uppercase; }

        input, select {
            width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2); color: white; outline: none;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

        /* Футер кнопок */
        .footer-nav { display: flex; justify-content: space-between; padding: 20px 40px; border-top: 1px solid rgba(255,255,255,0.05); }
        .btn-action { padding: 12px 24px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; background: var(--accent); color: white; }
        .btn-prev { background: rgba(255,255,255,0.1); color: var(--text); }

        /* 8. Экспорт */
        .code-box { background: #000; color: #10b981; padding: 20px; border-radius: 10px; font-family: monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; margin-top: 10px; }

        .lang-fixed { margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); }

        /* Персонаж */
        .pet-preview { font-size: 60px; text-align: center; padding: 20px; border: 2px dashed var(--accent); border-radius: 20px; }
    </style>
</head>
<body>

    <aside>
        <div class="logo">🌿 TAMA-EDITOR PRO</div>
        <nav>
            <button class="nav-btn active" onclick="showStep('step-main')">⚙️ <span data-i18n="nav-1">Настройки</span></button>
            <button class="nav-btn" onclick="showStep('step-content')">📚 <span data-i18n="nav-2">12 Тем</span></button>
            <button class="nav-btn" onclick="showStep('step-design')">🎨 <span data-i18n="nav-3">Дизайн</span></button>
            <button class="nav-btn" onclick="showStep('step-export')">🚀 <span data-i18n="nav-4">Экспорт</span></button>
        </nav>

        <div class="lang-fixed">
            <label style="font-size: 11px; opacity: 0.5;" data-i18n="lbl-ui-lang">ЯЗЫК РЕДАКТОРА</label>
            <select id="ui-lang" onchange="applyUiLang(this.value)">
                <option value="ru">Русский</option><option value="en">English</option><option value="de">Deutsch</option>
                <option value="fr">Français</option><option value="es">Español</option><option value="it">Italiano</option>
                <option value="pt">Português</option><option value="zh">中文</option><option value="ja">日本語</option>
                <option value="ar">العربية</option><option value="hi">हिन्दी</option><option value="fa">فارси</option>
            </select>
        </div>
    </aside>

    <div class="scroll-container">
        <main>
            <section id="step-main" class="panel active">
                <h2 data-i18n="h-settings">Основные параметры</h2>
                <div class="glass-card">
                    <label data-i18n="lbl-game-title">Название игры:</label>
                    <input type="text" id="game-title" placeholder="Напр: Мой Тамагочи" oninput="sync()">
                    <br><br>
                    <label data-i18n="lbl-content-lang">Язык заданий (в самой игре):</label>
                    <select id="game-content-lang" onchange="sync()">
                        <option value="ru">Русский</option><option value="en">English</option>
                        <option value="de">Deutsch</option><option value="fr">Français</option>
                    </select>
                </div>
                <div class="pet-preview">🐱 <br><small style="font-size: 14px; color: var(--accent);">Питомец: Котёнок</small></div>
            </section>

            <section id="step-content" class="panel">
                <h2 data-i18n="h-content">Настройка уровней</h2>
                
                <div class="glass-card">
                    <input type="text" class="lvl-header" id="l1-name" value="Уровень 1: Лексика" oninput="sync()">
                    <div class="topics-grid">
                        <input type="text" class="t-in" placeholder="Тема 1" oninput="sync()">
                        <input type="text" class="t-in" placeholder="Тема 2" oninput="sync()">
                        <input type="text" class="t-in" placeholder="Тема 3" oninput="sync()">
                        <input type="text" class="t-in" placeholder="Тема 4" oninput="sync()">
                    </div>
                </div>

                <div class="glass-card">
                    <input type="text" class="lvl-header" id="l2-name" value="Уровень 2: Фразы" oninput="sync()">
                    <div class="topics-grid">
                        <input type="text" class="t-in" placeholder="Тема 5" oninput="sync()">
                        <input type="text" class="t-in" placeholder="Тема 6" oninput="sync()">
                        <input type="text" class="t-in" placeholder="Тема 7" oninput="sync()">
                        <input type="text" class="t-in" placeholder="Тема 8" oninput="sync()">
                    </div>
                </div>

                <div class="glass-card">
                    <input type="text" class="lvl-header" id="l3-name" value="Уровень 3: Текст" oninput="sync()">
                    <div class="topics-grid">
                        <input type="text" class="t-in" placeholder="Тема 9" oninput="sync()">
                        <input type="text" class="t-in" placeholder="Тема 10" oninput="sync()">
                        <input type="text" class="t-in" placeholder="Тема 11" oninput="sync()">
                        <input type="text" class="t-in" placeholder="Тема 12" oninput="sync()">
                    </div>
                </div>
            </section>

            <section id="step-design" class="panel">
                <h2 data-i18n="h-design">Внешний вид</h2>
                <div class="glass-card">
                    <label data-i18n="lbl-theme">Цветовая тема:</label>
                    <select onchange="document.body.className = this.value + '-mode'">
                        <option value="dark">Тёмный лес (Стандарт)</option>
                        <option value="light">Светлый день</option>
                    </select>
                    <br><br>
                    <label data-i18n="lbl-border">Толщина линий (px):</label>
                    <input type="range" min="1" max="6" value="2" oninput="document.documentElement.style.setProperty('--border-w', this.value+'px')">
                    <br><br>
                    <label data-i18n="lbl-font">Шрифт:</label>
                    <select onchange="document.documentElement.style.setProperty('--font-main', this.value)">
                        <option value="'Outfit'">Outfit (Modern)</option>
                        <option value="'Space Grotesk'">Space Grotesk (Tech)</option>
                    </select>
                </div>
                <div class="glass-card">
                    <label data-i18n="lbl-music">Музыка в редакторе:</label>
                    <select id="editor-music">
                        <option value="none">Без музыки</option>
                        <option value="forest">Звуки леса</option>
                        <option value="lofi">Lo-Fi Chill</option>
                    </select>
                </div>
            </section>

            <section id="step-export" class="panel">
                <h2 data-i18n="h-export">Готово!</h2>
                <div class="glass-card">
                    <p><b data-i18n="if-editor">Ссылка для возврата в редактор:</b></p>
                    <div class="code-box" id="link-editor">...</div>
                    <p style="margin-top:20px;"><b data-i18n="if-game">Iframe для вставки игры в Genially:</b></p>
                    <div class="code-box" id="link-game">...</div>
                </div>
            </section>
        </main>

        <div class="footer-nav">
            <button class="btn-action btn-prev" onclick="goBack()" data-i18n="btn-back">↩ Назад</button>
            <button class="btn-action" onclick="goNext()" data-i18n="btn-next">Далее ➔</button>
        </div>
    </div>

    <script>
        // 2. Локализация всех надписей (12 языков)
        const DICT = {
            ru: {
                "nav-1": "Настройки", "nav-2": "12 Тем", "nav-3": "Дизайн", "nav-4": "Экспорт",
                "h-settings": "Настройки игры", "h-content": "12 тем обучения", "h-design": "Стиль редактора", "h-export": "Код вставки",
                "lbl-game-title": "Заголовок игры:", "btn-next": "Далее ➔", "btn-back": "↩ Назад",
                "if-editor": "Ссылка на редактор (сохраните):", "if-game": "Код для Genially:"
            },
            en: {
                "nav-1": "Settings", "nav-2": "12 Topics", "nav-3": "Design", "nav-4": "Export",
                "h-settings": "Game Settings", "h-content": "12 Training Topics", "h-design": "Editor Style", "h-export": "Embed Codes",
                "lbl-game-title": "Game Title:", "btn-next": "Next ➔", "btn-back": "↩ Back",
                "if-editor": "Editor Link (save this):", "if-game": "Code for Genially:"
            }
            // ... Здесь добавляются остальные 10 языков (DE, FR, ES, IT, PT, ZH, JA, AR, HI, FA)
        };

        let history = ['step-main'];

        function showStep(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            const btn = Array.from(document.querySelectorAll('.nav-btn')).find(b => b.onclick.toString().includes(id));
            if(btn) btn.classList.add('active');
            
            if(history[history.length-1] !== id) history.push(id);
            sync();
        }

        function goBack() {
            if(history.length > 1) {
                history.pop();
                showStep(history[history.length-1]);
            }
        }

        function goNext() {
            const steps = ['step-main', 'step-content', 'step-design', 'step-export'];
            let current = steps.find(s => document.getElementById(s).classList.contains('active'));
            let idx = steps.indexOf(current);
            if(idx < steps.length - 1) showStep(steps[idx+1]);
        }

        function applyUiLang(lang) {
            const d = DICT[lang] || DICT['en'];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(d[key]) el.innerText = d[key];
            });
            document.body.dir = (lang === 'ar' || lang === 'fa') ? 'rtl' : 'ltr';
            sync();
        }

        // Синхронизация данных и генерация ссылок (Пункт 8)
        function sync() {
            const config = {
                title: document.getElementById('game-title').value,
                l1_name: document.getElementById('l1-name').value,
                l2_name: document.getElementById('l2-name').value,
                l3_name: document.getElementById('l3-name').value,
                topics: Array.from(document.querySelectorAll('.t-in')).map(i => i.value),
                lang: document.getElementById('game-content-lang').value
            };

            const dataStr = btoa(encodeURIComponent(JSON.stringify(config)));
            const editorLink = window.location.href.split('?')[0] + "?state=" + dataStr;
            const gameIframe = `<iframe src="https://irinschensmagen-alt.github.io/Game-Tamagotchi-Build/?data=${dataStr}" width="100%" height="600px" frameborder="0"></iframe>`;

            document.getElementById('link-editor').innerText = editorLink;
            document.getElementById('link-game').innerText = gameIframe;

            localStorage.setItem('tama_editor_save', JSON.stringify(config));
        }

        // Загрузка состояния (Пункт 8)
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            let saved = urlParams.get('state');
            if(saved) saved = JSON.parse(decodeURIComponent(atob(saved)));
            else saved = JSON.parse(localStorage.getItem('tama_editor_save'));

            if(saved) {
                document.getElementById('game-title').value = saved.title || '';
                document.getElementById('l1-name').value = saved.l1_name || '';
                const inputs = document.querySelectorAll('.t-in');
                if(saved.topics) saved.topics.forEach((v, i) => { if(inputs[i]) inputs[i].value = v; });
                sync();
            }
        };
    </script>
</body>
</html>
