<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<style>
  :root { --p: #16a34a; --bg: #050e0a; --t: #ecfdf5; }
  body { background: var(--bg); color: var(--t); font-family: 'Outfit', sans-serif; padding: 20px; overflow-y: auto; }
  .card { background: rgba(74,222,128,0.05); border: 1px solid rgba(74,222,128,0.2); padding: 15px; border-radius: 12px; margin-bottom: 10px; }
  input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 8px; margin: 4px 0; border-radius: 4px; font-size: 12px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btn { background: var(--p); color: #fff; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
  h4 { margin: 0 0 10px; color: var(--p); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
  #res { width: 100%; height: 50px; margin-top: 10px; background: #071410; color: #4ade80; font-size: 10px; border: 1px dashed var(--p); }
</style>
</head>
<body>

<div class="card">
  <h4>⚙️ Diziplin: Deutsch A1-B1</h4>
  <input id="title" value="Tamagotchi: Wortschatz">
</div>

<div class="card">
  <h4>📚 12 Themen (Bearbeiten)</h4>
  <div class="grid">
    <div><label style="font-size:10px">1. Basis</label><input class="tp" value="Schlaf"></div>
    <div><label style="font-size:10px">2. Basis</label><input class="tp" value="Essen"></div>
    <div><label style="font-size:10px">3. Basis</label><input class="tp" value="Spaziergang"></div>
    <div><label style="font-size:10px">4. Basis</label><input class="tp" value="Spiel"></div>
    <div><label style="font-size:10px">5. Erhöht</label><input class="tp" value="Kleidung"></div>
    <div><label style="font-size:10px">6. Erhöht</label><input class="tp" value="Hobby"></div>
    <div><label style="font-size:10px">7. Erhöht</label><input class="tp" value="Krankheit"></div>
    <div><label style="font-size:10px">8. Erhöht</label><input class="tp" value="Hygiene"></div>
    <div><label style="font-size:10px">9. Hoch</label><input class="tp" value="Freundschaft"></div>
    <div><label style="font-size:10px">10. Hoch</label><input class="tp" value="Emotionen"></div>
    <div><label style="font-size:10px">11. Hoch</label><input class="tp" value="Wissen"></div>
    <div><label style="font-size:10px">12. Hoch</label><input class="tp" value="Feiertag"></div>
  </div>
</div>

<div class="card">
  <h4>🕹️ Logik (Fixiert)</h4>
  <p style="font-size:10px; opacity:0.6;">Study: 0.8x, Limit 2x | Test: 2 Min, Block "Time is up"</p>
</div>

<button class="btn" onclick="build()">CODE ДЛЯ ИГРЫ СГЕНЕРИРОВАТЬ</button>
<textarea id="res" readonly placeholder="Нажми кнопку выше..."></textarea>

<script>
function build() {
  const cfg = {
    title: document.getElementById('title').value,
    topics: Array.from(document.querySelectorAll('.tp')).map(i => i.value),
    rules: { study: {speed: 0.8, limit: 2}, test: {time: 120, msg: "Time is up"} }
  };
  const data = btoa(unescape(encodeURIComponent(JSON.stringify(cfg))));
  // Это ссылка на внешний плеер, который не грузит Genially
  document.getElementById('res').value = `<iframe src="https://tamo-app.github.io/play/?c=${data}" width="100%" height="600" frameborder="0"></iframe>`;
}
</script>
</body>
</html>
