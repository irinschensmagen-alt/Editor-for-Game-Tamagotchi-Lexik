<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamagotchi Editor (Fixed Original)</title>

<style>
body{margin:0;font-family:Arial;display:flex;height:100vh;overflow:auto}
.sidebar{width:240px;background:#111;color:#fff;overflow-y:auto}
.main{flex:1;overflow-y:auto;padding:20px}
.panel{display:none}
.panel.active{display:block}
.topic{border:1px solid #ccc;padding:10px;margin-bottom:10px}
.topbar{background:#222;color:#fff;padding:10px;display:flex;gap:10px}
.pet{font-size:40px}
.stat{margin:5px 0}
</style>
</head>

<body>

<div class="topbar">
<button onclick="goBack()">← Назад</button>
<select onchange="setLang(this.value)">
<option value="ru">RU</option>
<option value="en">EN</option>
<option value="de">DE</option>
<option value="fr">FR</option>
<option value="es">ES</option>
<option value="it">IT</option>
</select>
<button onclick="saveAll()">💾</button>
<button onclick="startGame()">▶</button>
<button onclick="generateLinks()">Ссылки</button>
</div>

<div class="sidebar">
<button onclick="showPanel('settings')">Настройки</button>
<button onclick="showPanel('content')">Темы</button>
<button onclick="showPanel('game')">Игра</button>
</div>

<div class="main">

<div id="settings" class="panel active">
<h2 data-i18n="title">Название игры</h2>
<input id="gameTitle">
</div>

<div id="content" class="panel">
<h2 data-i18n="topics">Темы</h2>
<div id="topics"></div>
</div>

<div id="game" class="panel">
<h2 id="gameTitleView"></h2>
<div class="pet" id="pet">🐣</div>

<div class="stat">❤️ <span id="hp">100</span></div>
<div class="stat">🍗 <span id="food">100</span></div>
<div class="stat">😊 <span id="happy">100</span></div>

<hr>
<div id="gameTask"></div>
<input id="gameAnswer">
<button onclick="checkAnswer()">OK</button>
<div id="gameStatus"></div>
</div>

<div id="links"></div>

</div>

<script>
const LANG={
ru:{title:"Название игры",topic:"Тема",topics:"Темы",levels:["Базовый","Повышенный","Высокий"]},
en:{title:"Game Title",topic:"Topic",topics:"Topics",levels:["Basic","Medium","Hard"]},
de:{title:"Spielname",topic:"Thema",topics:"Themen",levels:["Grund","Mittel","Hoch"]},
fr:{title:"Titre du jeu",topic:"Sujet",topics:"Sujets",levels:["Basique","Moyen","Avancé"]},
es:{title:"Título del juego",topic:"Tema",topics:"Temas",levels:["Básico","Medio","Avanzado"]},
it:{title:"Titolo del gioco",topic:"Argomento",topics:"Argomenti",levels:["Base","Medio","Avanzato"]}
};

let currentLang="ru";
let historyStack=[];
let data={levels:[]};
let gameIndex={l:0,t:0,w:0};
let petState={hp:100,food:100,happy:100};

function showPanel(id){
 historyStack.push(id);
 document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

function goBack(){historyStack.pop();const prev=historyStack.pop();if(prev) showPanel(prev)}

function setLang(lang){currentLang=lang;applyLang()}

function applyLang(){
 const dict=LANG[currentLang];
 document.querySelectorAll('[data-i18n]').forEach(el=>{
  el.textContent=dict[el.dataset.i18n]||'';
 });
 generateTopics();
 loadInputs();
}

function generateTopics(){
 const container=document.getElementById('topics');
 container.innerHTML="";
 LANG[currentLang].levels.forEach((lvl,l)=>{
  let block=`<h3>${lvl}</h3>`;
  for(let t=0;t<4;t++){
   block+=`<div class='topic'>
   <input data-l='${l}' data-t='${t}' class='topicName'>
   <textarea data-l='${l}' data-t='${t}' class='topicWords' placeholder='слово:ответ'></textarea>
   </div>`;
  }
  container.innerHTML+=block;
 });
}

function saveAll(){
 data.title=document.getElementById('gameTitle').value;
 data.lang=currentLang;
 data.levels=[];
 document.querySelectorAll('.topicName').forEach((el,i)=>{
  const l=el.dataset.l,t=el.dataset.t;
  if(!data.levels[l]) data.levels[l]=[];
  data.levels[l][t]={
   name:el.value,
   words:document.querySelectorAll('.topicWords')[i].value.split(',')
  };
 });
 localStorage.setItem('tamaEditor',JSON.stringify(data));
}

function loadInputs(){
 const saved=localStorage.getItem('tamaEditor');
 if(!saved) return;
 data=JSON.parse(saved);
 document.getElementById('gameTitle').value=data.title||'';
 setTimeout(()=>{
  document.querySelectorAll('.topicName').forEach((el,i)=>{
   const l=el.dataset.l,t=el.dataset.t;
   if(data.levels[l] && data.levels[l][t]){
    el.value=data.levels[l][t].name;
    document.querySelectorAll('.topicWords')[i].value=data.levels[l][t].words.join(',');
   }
  });
 },0);
}

function startGame(){
 saveAll();
 petState={hp:100,food:100,happy:100};
 showPanel('game');
 gameIndex={l:0,t:0,w:0};
 document.getElementById('gameTitleView').innerText=data.title;
 updatePet();
 nextTask();
 startDecay();
}

function updatePet(){
 document.getElementById('hp').innerText=petState.hp;
 document.getElementById('food').innerText=petState.food;
 document.getElementById('happy').innerText=petState.happy;
 if(petState.hp<=0) pet.innerText='💀';
 else if(petState.happy>70) pet.innerText='😺';
 else if(petState.happy>40) pet.innerText='🙂';
 else pet.innerText='😿';
}

function nextTask(){
 const lvl=data.levels[gameIndex.l];
 if(!lvl) return endGame();
 const topic=lvl[gameIndex.t];
 if(!topic){gameIndex.l++;gameIndex.t=0;return nextTask();}
 const pair=topic.words[gameIndex.w%topic.words.length];
 const parts=pair.split(':');
 window.currentQ=parts[0];
 window.currentA=(parts[1]||'').trim().toLowerCase();
 gameTask.innerText=window.currentQ;
 gameAnswer.value='';
}

function checkAnswer(){
 const ans=gameAnswer.value.trim().toLowerCase();
 if(ans===window.currentA && ans!==''){
  gameStatus.innerText='✔';
  petState.happy+=5;
 }else{
  gameStatus.innerText='✖';
  petState.hp-=10;
 }
 petState.food-=2;
 gameIndex.w++;
 updatePet();
 nextTask();
}

function startDecay(){
 setInterval(()=>{
  petState.food-=1;
  if(petState.food<30) petState.hp-=1;
  updatePet();
 },3000);
}

function endGame(){gameTask.innerText='END'}

function generateLinks(){
 const encoded=btoa(JSON.stringify(data));
 const link=location.href+"?data="+encoded;
 document.getElementById('links').innerHTML=`<input value='${link}' style='width:100%'>`;
}

window.onload=()=>{generateTopics();applyLang();loadInputs()};
</script>

</body>
</html>
